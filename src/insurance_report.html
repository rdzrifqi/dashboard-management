{{> partials/main }}

<head>

    {{> partials/title-meta title="Real Estate Dashboard" }}

    {{> partials/head-css }}

    <style>
        /* Pastikan elemen peta punya tinggi, kalau tidak peta tidak akan terlihat */
        html,body { height: 100%; margin: 0; }
        #soSummaryTable {
            width: 100% !important;
        }
        #soSummaryTable thead th {
            background-color: #2d4169; /* biru */
            color: white;
        }
    </style>
</head>

{{> partials/body }}
<script src="assets/js/pages/authMiddleware.js"></script>
<!-- Start Layout -->
<div class="bg-slate-50 dark:bg-dark">

    <!-- Start detached bg -->
    <div class="bg-[url('../images/bg-main.png')] bg-black group-data-[sidebar=dark]/item:bg-darklight group-data-[sidebar=brand]/item:bg-sky-950 min-h-[220px] sm:min-h-[250px] bg-bottom fixed hidden w-full -z-50 detached-img"></div>
    <!-- End detached bg -->

    <!-- Start Menu Sidebar Overlay -->
    <div x-cloak class="fixed inset-0 z-10 bg-black/60 dark:bg-dark/90 lg:hidden" :class="{'hidden' : !$store.app.sidebar}" @click="$store.app.toggleSidebar()"></div>
    <!-- End Menu Sidebar Overlay -->

    <!-- Start Main Content -->
    <div class="flex mx-auto main-container">
        {{> partials/sidebar }}

        <!-- Start Content Area -->
        <div class="flex-1 main-content">
            {{> partials/topbar }}
            <!-- Start Content -->
            <div class="h-[calc(100vh-60px)] relative space-y-4 detached-content">
                <div id="insurance_report"></div>
            </div>
        </div>
    </div>
</div>

{{> partials/vendor-scripts }}

<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
<script type="module" src="assets/js/main.js"></script>
<script src="assets/libs/apexcharts/apexcharts.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js"></script>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="assets/js/pages/insurance_report.jsx"></script>
<script type="module" src="assets/js/pages/logout.js"></script>
</body>

</html>
