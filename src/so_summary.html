{{> partials/main }}

<head>

    {{> partials/title-meta title="ST Corp dahboard  - development by: clavisdev" }}

    {{> partials/head-css }}
    <script>
        document.addEventListener('alpine:initialized', () => {
            const app = Alpine.store('app');
            const applyMode = () => {
                if (app.mode === 'dark') {
                    document.documentElement.classList.add('dark');
                } else {
                    document.documentElement.classList.remove('dark');
                }
            };

            // initial
            applyMode();

            // watch perubahan
            Alpine.effect(() => {
                applyMode();
            });
        });
    </script>
    <style>
        /* Pastikan elemen peta punya tinggi, kalau tidak peta tidak akan terlihat */
        html,body { height: 100%; margin: 0; }
        #soSummaryTable {
            width: 100% !important;
        }
        #soSummaryTable thead th {
            background-color: #2d4169; /* biru */
            color: white;
        }
        #soSummaryTable_length select{
            width: 6vh;
            margin-bottom: 6px;
        }
        #soSummaryTable_wrapper thead th {
            background-color: rgb(23 37 84) !important; /* blue-950 */
            color: white !important;
        }
        #soSummaryTable th:first-child,
        #soSummaryTable thead th:first-child {
            z-index: 30;
        }
        .dataTables_scrollHead table th:first-child {
            position: sticky !important;
            left: 0;
            z-index: 60;
            background-color: rgb(23 37 84) !important;
            color: white !important;
        }

        /* STICKY BODY */
        .dataTables_scrollBody table td:first-child {
            position: sticky !important;
            left: 0;
            z-index: 50;
            background-color: #ffffff !important;
            color: black !important;
        }

        /* DARK MODE */
        .dark .dataTables_scrollBody table tbody tr td:first-child,
        .dark .dataTables_scrollBody table tbody tr.odd td:first-child,
        .dark .dataTables_scrollBody table tbody tr.even td:first-child {
            background-color: #111827 !important;
            color: white !important;
        }
    </style>
</head>

{{> partials/body }}
<script src="assets/js/pages/authMiddleware.js"></script>
<!-- Start Layout -->
<div class="bg-slate-50 dark:bg-dark">

    <!-- Start detached bg -->
    <div class="bg-[url('../images/bg-main.png')] bg-black group-data-[sidebar=dark]/item:bg-darklight group-data-[sidebar=brand]/item:bg-sky-950 min-h-[220px] sm:min-h-[250px] bg-bottom fixed hidden w-full -z-50 detached-img"></div>
    <!-- End detached bg -->

    <!-- Start Menu Sidebar Overlay -->
    <div x-cloak class="fixed inset-0 z-10 bg-black/60 dark:bg-dark/90 lg:hidden" :class="{'hidden' : !$store.app.sidebar}" @click="$store.app.toggleSidebar()"></div>
    <!-- End Menu Sidebar Overlay -->

    <!-- Start Main Content -->
    <div class="flex mx-auto main-container">
        {{> partials/sidebar }}

        <!-- Start Content Area -->
        <div class="flex-1 main-content">
            {{> partials/topbar }}
            <!-- Start Content -->
            <div class="h-[calc(100vh-60px)] relative space-y-4 detached-content">
                <div id="so_summary" class="dark:bg-dark"></div>
            </div>
        </div>
    </div>
</div>
