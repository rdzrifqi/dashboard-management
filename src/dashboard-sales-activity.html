    <style>
        /* Pastikan elemen peta punya tinggi, kalau tidak peta tidak akan terlihat */
        html,body { height: 100%; margin: 0; }
        #map { height: 56.3vh; width: 100%; }
        #card-sales { height: 62vh; width: 100%; overflow-y: auto;}
        /* kecilkan popup font jika perlu */
        .leaflet-popup-content { font-size: 14px; }
        .leaflet-container {
            z-index: 0 !important;
        }
        .custom-marker {
            background: none;
            border: none;
        }

        .pin-wrapper {
            width: 50px;
            height: 60px;
            background: url('/assets/images/location_2.png') no-repeat center;
            background-size: contain;
            position: relative;
        }

        .pin-wrapper img {
            position: absolute;
            top: 6px;
            left: 7px;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
        }
        .pin-wrapper-close {
            width: 50px;
            height: 60px;
            background: url('/assets/images/location.png') no-repeat center;
            background-size: contain;
            position: relative;
        }

        .pin-wrapper-close img {
            position: absolute;
            top: 6px;
            left: 7px;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
        }
        #salesTable {
            width: 100% !important;
        }
    </style>
</head>
